<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Synthrun Mail</title>
<script>
(function(){var t=localStorage.getItem('synthrun-theme');if(!t){try{t=(document.cookie.match(/(?:^|;\s*)synthrun-theme=([^;]*)/)||[])[1]||''}catch(e){}}
var d=t==='dark'?t:t==='light'?t:(window.matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light');
document.documentElement.setAttribute('data-theme',d);})();
window.__loadingPhases = [
  { label: 'Initialising…', pct: 10 },
  { label: 'Connecting to server…', pct: 25 },
  { label: 'Authenticating session…', pct: 50 },
  { label: 'Syncing mailboxes…', pct: 70 },
  { label: 'Loading threads…', pct: 88 },
  { label: 'Ready', pct: 100 },
];
window.__loadingReady = false;
window.__loadingQueue = [];
window.SYNTHRUN_UPDATE_LOADING = function(i) {
  if (!window.__loadingReady) { window.__loadingQueue.push(i); return; }
  window.__setPhase(i);
};
if (sessionStorage.getItem('synthrun-booted')) window.__skipLoader = true;
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;1,9..144,300;1,9..144,400&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
/* ─── Reset & Base ─────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; }
html, body { margin: 0; width: 100%; height: 100%; }

/* ─── Tokens ────────────────────────────────────────────────── */
:root {
  --bg: #fafaf8;
  --panel: rgba(255,255,255,0.82);
  --panel-strong: #ffffff;
  --text: #111110;
  --muted: #6d6d67;
  --subtle: #9a9a92;
  --line: #deddd7;
  --accent: #111110;
  --accent-contrast: #fafaf8;
  --unread-dot: #4a9c6d;
  --radius: 0px;
  --header-h: 56px;
  --status-h: 28px;
  --mobile-nav-h: 0px;
  --sidebar-w: 220px;
  --thread-w: 320px;
  --transition: 150ms ease;
}
html[data-theme="dark"], body[data-theme="dark"] {
  --bg: #101114;
  --panel: rgba(24,26,31,0.86);
  --panel-strong: #15171b;
  --text: #eceae2;
  --muted: #b0aba0;
  --subtle: #7f7a70;
  --line: #2a2d34;
  --accent: #eceae2;
  --accent-contrast: #111110;
}

/* ─── Body ───────────────────────────────────────────────────── */
body {
  background:
    radial-gradient(circle at top left, rgba(180,170,150,0.14), transparent 30%),
    radial-gradient(circle at bottom right, rgba(110,120,130,0.08), transparent 28%),
    var(--bg);
  color: var(--text);
  font-family: 'DM Mono', monospace;
  font-weight: 300;
  font-size: 13px;
  line-height: 1.5;
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
}
button, input, textarea, select { font: inherit; color: inherit; }
a { color: inherit; text-decoration: none; }

/* ─── Utilities ──────────────────────────────────────────────── */
.sr-only {
  position: absolute; width: 1px; height: 1px;
  padding: 0; margin: -1px; overflow: hidden;
  clip: rect(0,0,0,0); white-space: nowrap; border: 0;
}
.truncate { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

/* ─── Header ─────────────────────────────────────────────────── */
header {
  height: var(--header-h);
  display: grid;
  grid-template-columns: var(--sidebar-w) 1fr auto;
  align-items: center;
  gap: 12px;
  padding: 0 16px 0 0;
  border-bottom: 1px solid var(--line);
  background: var(--panel);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
  position: relative;
  z-index: 10;
}
.h-logo {
  display: flex;
  gap: 9px;
  align-items: center;
  justify-content: center;
  text-transform: uppercase;
  font-size: 11px;
  letter-spacing: 0.14em;
  height: 100%;
  padding: 0 18px;
  flex: 1; min-width: 0;
  border-right: 1px solid var(--line);
  color: var(--text);
  transition: background var(--transition);
}
.h-logo:hover { background: rgba(0,0,0,0.03); }
body[data-theme="dark"] .h-logo:hover { background: rgba(255,255,255,0.03); }
.h-logo svg { width: 17px; height: 17px; stroke: currentColor; fill: none; stroke-width: 1.4; flex-shrink: 0; }

/* ─── Sidebar Toggle (mobile only) ──────────────────────────── */
.sidebar-toggle {
  display: none;
  place-items: center;
  width: 44px; height: 44px;
  border: none; background: none;
  cursor: pointer; color: var(--text);
  flex-shrink: 0;
  -webkit-tap-highlight-color: transparent;
}
.sidebar-toggle svg { width: 20px; height: 20px; stroke: currentColor; fill: none; stroke-width: 1.6; }
.h-left { display: flex; align-items: center; }

.h-search {
  display: flex;
  align-items: center;
  gap: 10px;
  border: 1px solid var(--line);
  background: rgba(255,255,255,0.22);
  padding: 0 12px;
  height: 34px;
  max-width: 480px;
  transition: border-color var(--transition), background var(--transition);
}
body[data-theme="dark"] .h-search { background: rgba(0,0,0,0.16); }
.h-search:focus-within { border-color: var(--muted); }
.h-search svg { width: 13px; height: 13px; stroke: var(--subtle); fill: none; stroke-width: 1.6; flex-shrink: 0; }
.h-search input {
  width: 100%; border: 0; outline: 0;
  background: transparent; color: var(--text);
  font-size: 12px;
}
.h-search input::placeholder { color: var(--subtle); }

.h-right { display: flex; align-items: center; gap: 8px; }

/* ─── Icon Button ────────────────────────────────────────────── */
.icon-btn {
  width: 34px; height: 34px;
  display: grid; place-items: center;
  border: 1px solid var(--line);
  background: transparent; cursor: pointer;
  color: var(--text);
  transition: background var(--transition), border-color var(--transition);
  flex-shrink: 0;
}
.icon-btn:hover { background: rgba(0,0,0,0.05); }
body[data-theme="dark"] .icon-btn:hover { background: rgba(255,255,255,0.05); }
.icon-btn:focus-visible { outline: 2px solid var(--text); outline-offset: 2px; }
.icon-btn svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 1.6; }
#flagBtn[aria-pressed="true"] svg,
#importantBtn[aria-pressed="true"] svg {
  fill: currentColor;
}
#archiveBtn[aria-pressed="true"] svg {
  fill: currentColor;
}

/* ─── User Chip ──────────────────────────────────────────────── */
.user-chip {
  position: relative;
  display: flex; align-items: center; gap: 9px;
  border: 1px solid var(--line);
  padding: 5px 10px;
  min-width: 160px;
  max-width: 200px;
  background: var(--panel-strong);
  cursor: pointer;
  user-select: none;
  transition: background var(--transition);
}
.user-chip:hover { background: rgba(0,0,0,0.03); }
body[data-theme="dark"] .user-chip:hover { background: rgba(255,255,255,0.03); }
.user-avatar {
  width: 26px; height: 26px;
  display: grid; place-items: center;
  border-radius: 50%;
  background: var(--accent); color: var(--accent-contrast);
  font-size: 10px; letter-spacing: 0.06em;
  flex-shrink: 0;
  line-height: 1;
}
.user-chip-email { font-size: 11px; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.user-chip-caret {
  width: 12px; height: 12px;
  stroke: var(--subtle); fill: none; stroke-width: 1.6;
  flex-shrink: 0; transition: transform var(--transition);
}
.user-chip[aria-expanded="true"] .user-chip-caret { transform: rotate(180deg); }

/* ─── User Menu ──────────────────────────────────────────────── */
.user-menu {
  position: absolute; right: 0; top: calc(100% + 6px);
  min-width: 180px;
  background: var(--panel-strong);
  border: 1px solid var(--line);
  box-shadow: 0 16px 40px rgba(0,0,0,0.13);
  padding: 6px;
  display: none; z-index: 40;
}
.user-menu.show { display: block; }
.user-menu-item {
  width: 100%; display: flex; align-items: center; gap: 9px;
  padding: 9px 10px; margin: 0;
  text-align: left; font-size: 11px;
  border: 1px solid transparent; background: transparent; cursor: pointer;
  color: var(--text);
  transition: background var(--transition);
}
.user-menu-item:hover { background: rgba(0,0,0,0.04); border-color: var(--line); }
body[data-theme="dark"] .user-menu-item:hover { background: rgba(255,255,255,0.04); }
.user-menu-item svg { width: 13px; height: 13px; stroke: currentColor; fill: none; stroke-width: 1.6; flex-shrink: 0; }
.user-menu-divider { height: 1px; background: var(--line); margin: 6px 0; }

/* ─── App Body ───────────────────────────────────────────────── */
.app-body {
  height: calc(100vh - var(--header-h) - var(--status-h) - var(--mobile-nav-h));
  display: grid;
  grid-template-columns: var(--sidebar-w) 1fr;
  min-height: 0;
}

/* ─── Sidebar ────────────────────────────────────────────────── */
aside {
  border-right: 1px solid var(--line);
  background: var(--panel);
  padding: 14px 12px;
  display: flex; flex-direction: column; gap: 14px;
  overflow-y: auto; min-height: 0;
  scrollbar-width: thin; scrollbar-color: var(--line) transparent;
}
aside hr { width: 100%; border: 0; border-top: 1px solid var(--line); margin: 0; }

/* ─── Compose Button ─────────────────────────────────────────── */
.compose-btn {
  height: 44px; width: 100%;
  display: inline-flex; align-items: center; justify-content: center; gap: 9px;
  background: var(--accent); color: var(--accent-contrast);
  border: 1px solid var(--accent);
  text-transform: uppercase; font-size: 11px; letter-spacing: 0.1em;
  cursor: pointer;
  transition: opacity var(--transition);
  border-radius: 10px;
  font-weight: 600;
}
.compose-btn:hover { opacity: 0.85; }
.compose-btn:focus-visible { outline: 2px solid var(--text); outline-offset: 2px; }
.compose-btn svg { width: 13px; height: 13px; stroke: currentColor; fill: none; stroke-width: 1.6; flex-shrink: 0; }

/* ─── Sidebar Nav ────────────────────────────────────────────── */
.side-section { display: flex; flex-direction: column; gap: 2px; }
.side-label {
  color: var(--subtle); font-size: 9px;
  letter-spacing: 0.16em; text-transform: uppercase;
  padding: 2px 4px 6px;
}
.side-link {
  display: flex; align-items: center; justify-content: space-between;
  gap: 8px; padding: 9px 10px;
  font-size: 11px; text-align: left;
  border: 1px solid transparent; background: transparent; cursor: pointer;
  color: var(--text);
  transition: background var(--transition), border-color var(--transition);
  width: 100%;
}
.side-link:hover { background: rgba(0,0,0,0.04); border-color: var(--line); }
body[data-theme="dark"] .side-link:hover { background: rgba(255,255,255,0.04); }
.side-link.active { background: rgba(0,0,0,0.06); border-color: var(--line); }
body[data-theme="dark"] .side-link.active { background: rgba(255,255,255,0.07); }
.side-link-left { display: inline-flex; align-items: center; gap: 8px; flex-shrink: 0; }
.side-link-left svg { width: 13px; height: 13px; stroke: currentColor; fill: none; stroke-width: 1.5; flex-shrink: 0; }
.side-badge {
  min-width: 24px; padding: 2px 5px;
  border: 1px solid var(--line);
  font-size: 9px; text-align: center;
  line-height: 1.6; flex-shrink: 0;
}
.side-badge.zero { opacity: 0.5; }

/* ─── Mail Panel ─────────────────────────────────────────────── */
.mail-panel {
  min-width: 0; display: grid;
  grid-template-columns: var(--thread-w) 1fr;
  min-height: 0;
}
body.layout-gmail .mail-panel {
  grid-template-columns: 1fr;
  position: relative;
  overflow: hidden;
}
body.layout-gmail .mail-view {
  position: absolute;
  inset: 0;
  z-index: 2;
  background: var(--panel-strong);
  transform: translateX(100%);
  transition: transform 0.28s cubic-bezier(0.4, 0, 0.2, 1);
  will-change: transform;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
body.layout-gmail .mail-panel.message-open .mail-view {
  transform: translateX(0);
}
body.layout-gmail .mail-panel.message-open .thread-list {
  transform: translateX(-30%);
  transition: transform 0.28s cubic-bezier(0.4, 0, 0.2, 1);
}
body.layout-gmail .thread-list {
  position: absolute;
  inset: 0;
  width: 100%;
  z-index: 1;
  background: var(--panel-strong);
  transition: transform 0.28s cubic-bezier(0.4, 0, 0.2, 1);
}
body.layout-gmail #messageView {
  flex-direction: column;
  flex: 1;
  min-height: 0;
  overflow: hidden;
}
body.layout-gmail #messageView[style*="flex"] {
  display: flex !important;
}
body.layout-gmail .mail-view-empty {
  display: none;
}
body.layout-gmail #splitResize {
  display: none;
}
body.layout-gmail .mobile-back-btn {
  display: grid !important;
  place-items: center;
  width: 30px; height: 30px;
  border: 1px solid var(--line);
  background: transparent;
  cursor: pointer;
  color: var(--muted);
  padding: 0;
  flex-shrink: 0;
}
body.layout-gmail .mobile-back-btn svg {
  width: 14px; height: 14px;
  stroke: currentColor;
  fill: none;
  stroke-width: 1.6;
}

/* ─── Thread List ────────────────────────────────────────────── */
.thread-list {
  border-right: 1px solid var(--line);
  display: flex; flex-direction: column;
  min-height: 0; background: var(--panel);
}
.thread-toolbar {
  height: 48px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 14px;
  border-bottom: 1px solid var(--line);
}
.toolbar-label {
  text-transform: uppercase; font-size: 11px; letter-spacing: 0.1em;
  color: var(--text);
}
.toolbar-selected-count {
  font-size: 11px; color: var(--subtle);
}
.bulk-actions {
  display: flex; align-items: center; gap: 4px;
}
.thread-items {
  overflow-y: auto; min-height: 0; flex: 1;
  scrollbar-width: thin; scrollbar-color: var(--line) transparent;
  -webkit-overflow-scrolling: touch;
}

/* ─── Thread Item ────────────────────────────────────────────── */
.thread-item {
  display: grid; grid-template-columns: auto 1fr auto;
  gap: 10px; padding: 13px 14px;
  border-bottom: 1px solid var(--line);
  cursor: pointer;
  transition: background var(--transition);
  position: relative;
}
.thread-item:hover { background: rgba(0,0,0,0.03); }
body[data-theme="dark"] .thread-item:hover { background: rgba(255,255,255,0.03); }
.thread-item.active { background: rgba(0,0,0,0.055); }
body[data-theme="dark"] .thread-item.active { background: rgba(255,255,255,0.06); }
.thread-item.selected { background: rgba(0,0,0,0.07); }
body[data-theme="dark"] .thread-item.selected { background: rgba(255,255,255,0.07); }
.thread-item.unread::before {
  content: '';
  position: absolute; left: 0; top: 0; bottom: 0;
  width: 2px;
  background: var(--unread-dot);
}
.thread-item.unread .thread-subject { font-weight: 500; }
body.density-compact .thread-item { padding: 8px 12px; gap: 8px; }
body.density-compact .thread-subject { font-size: 11px; }
body.density-compact .thread-preview { font-size: 10px; -webkit-line-clamp: 1; }
body.density-compact .thread-from { font-size: 10px; margin-bottom: 2px; }
body.density-compact .thread-time { font-size: 9px; }
body.density-compact .thread-tags { margin-top: 4px; }
body.density-compact .thread-tag { font-size: 8px; padding: 1px 4px; }
body.density-compact .thread-avatar { width: 28px; height: 28px; }
.thread-meta { min-width: 0; }
.thread-item > div { min-width: 0; }
.thread-body { overflow: hidden; }
.thread-from { font-size: 11px; color: var(--muted); margin-bottom: 3px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.thread-subject { font-size: 12px; line-height: 1.4; margin-bottom: 4px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.thread-preview { font-size: 11px; color: var(--subtle); line-height: 1.55; overflow: hidden; text-overflow: ellipsis; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
.thread-aside { display: flex; flex-direction: column; align-items: flex-end; gap: 6px; padding-top: 2px; }
.thread-time { font-size: 10px; color: var(--subtle); white-space: nowrap; line-height: 1.4; }
.thread-dot { display: none; }

/* ─── Thread Avatar ─────────────────────────────────────*/
.thread-avatar {
  width: 32px; height: 32px; border-radius: 50%;
  display: grid; place-items: center;
  flex-shrink: 0; cursor: pointer;
  position: relative; z-index: 1;
  background: var(--bg); border: 1px solid var(--line);
}
.thread-avatar-icon {
  width: 16px; height: 16px;
  stroke: var(--text); fill: none; stroke-width: 1.5;
  transition: opacity 0.15s;
}
.thread-avatar-checkbox {
  position: absolute; inset: -2px; border-radius: 50%;
  display: none; place-items: center;
  background: var(--panel); border: 2px solid var(--line);
  cursor: pointer; z-index: 2;
}
.thread-avatar-checkbox svg {
  width: 14px; height: 14px;
  stroke: var(--text); fill: none; stroke-width: 2.5;
}
.thread-item:hover .thread-avatar-icon { opacity: 0.2; }
.thread-item:hover .thread-avatar-checkbox { display: grid; }
.thread-item.selected .thread-avatar { border-color: var(--accent); }
.thread-item.selected .thread-avatar-icon { opacity: 0; }
.thread-item.selected .thread-avatar-checkbox { display: grid; }
.thread-avatar-checkbox.checked {
  background: var(--accent); border-color: var(--accent);
}
.thread-avatar-checkbox.checked svg { stroke: var(--accent-contrast); }
.thread-tags { display: flex; gap: 5px; margin-top: 7px; flex-wrap: wrap; }
.thread-tag { font-size: 9px; letter-spacing: 0.08em; text-transform: uppercase; padding: 2px 6px; border: 1px solid var(--line); line-height: 1.6; }
.tag-pending { border-color: var(--accent); color: var(--accent); }
.tag-error { border-color: #e74c3c; color: #e74c3c; }
.empty-state { padding: 32px 20px; color: var(--subtle); text-align: center; line-height: 1.8; }
.empty-state svg { width: 28px; height: 28px; stroke: currentColor; fill: none; stroke-width: 1.2; margin-bottom: 10px; opacity: 0.5; display: block; margin-inline: auto; }

/* ─── Mail View ──────────────────────────────────────────────── */
.mail-view { position: relative; display: flex; flex-direction: column; min-height: 0; background: var(--panel-strong); overflow: hidden; }
.mail-view-empty { flex: 1; display: flex; align-items: center; justify-content: center; color: var(--subtle); text-align: center; padding: 24px; pointer-events: none; }
.mail-view-empty-inner { display: flex; flex-direction: column; align-items: center; gap: 8px; animation: floatIn 0.38s ease both; }
.mail-view-empty svg { width: 38px; height: 38px; stroke: currentColor; fill: none; stroke-width: 1.2; opacity: 0.35; }
.mail-view-empty h3 { font-family: 'Fraunces', serif; font-weight: 300; font-size: 26px; margin: 0; line-height: 1.15; color: var(--muted); }
.mail-view-empty p { margin: 0; font-size: 11px; letter-spacing: 0.09em; text-transform: uppercase; color: var(--subtle); }
#messageView { display: none; flex-direction: column; height: 100%; overflow: hidden; }
.mail-header-bar { min-height: 60px; flex-shrink: 0; display: flex; align-items: flex-start; gap: 10px; padding: 14px 16px; border-bottom: 1px solid var(--line); }
.mail-subject-area { flex: 1; min-width: 0; padding-top: 2px; }
.mail-subject-line { font-family: 'Fraunces', serif; font-size: 22px; line-height: 1.2; font-weight: 300; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.mail-meta-row { display: flex; align-items: center; gap: 7px; margin-top: 5px; color: var(--subtle); font-size: 10px; flex-wrap: wrap; }
.mail-header-actions { display: flex; gap: 6px; align-items: center; flex-shrink: 0; padding-top: 2px; }
.mail-body-scroll { flex: 1; overflow-y: auto; padding: 16px; scrollbar-width: thin; scrollbar-color: var(--line) transparent; -webkit-overflow-scrolling: touch; }
.mail-bubble { border: 1px solid var(--line); background: var(--panel); margin-bottom: 12px; }
.mail-bubble-header { display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 11px 13px; border-bottom: 1px solid var(--line); }
.mail-sender-block { display: flex; align-items: center; gap: 10px; min-width: 0; }
.mail-sender-avatar { width: 28px; height: 28px; border-radius: 50%; border: 1px solid var(--line); display: grid; place-items: center; font-size: 10px; flex-shrink: 0; background: rgba(0,0,0,0.03); line-height: 1; }
body[data-theme="dark"] .mail-sender-avatar { background: rgba(255,255,255,0.04); }
.mail-sender-info { min-width: 0; }
.mail-sender-name { font-size: 12px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.mail-sender-addr { font-size: 10px; color: var(--subtle); margin-top: 1px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.mail-bubble-time { font-size: 10px; color: var(--subtle); white-space: nowrap; flex-shrink: 0; }
.mail-bubble-body { padding: 14px 13px 10px; white-space: pre-wrap; line-height: 1.85; font-size: 13px; color: var(--muted); }
.mail-bubble-body.is-html { white-space: normal; color: var(--text); background: transparent; color-scheme: light dark; }
.mail-bubble-body.is-html img { max-width: 100%; height: auto; }
.mail-bubble-body.is-html a { color: var(--accent); text-decoration: underline; }
.mail-bubble-body.is-html table { max-width: 100% !important; }
.mail-bubble-body.is-html td { word-break: break-word; }
.mail-attachments { padding: 0 13px 13px; }
.mail-attachments-title { font-size: 9px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--subtle); margin-bottom: 8px; }
.mail-attachments-list { display: grid; gap: 6px; }
.mail-attachment { display: flex; align-items: center; gap: 6px; border: 1px solid var(--line); padding: 0; background: rgba(0,0,0,0.02); transition: background var(--transition); }
.mail-attachment:hover { background: rgba(0,0,0,0.04); }
body[data-theme="dark"] .mail-attachment { background: rgba(255,255,255,0.02); }
body[data-theme="dark"] .mail-attachment:hover { background: rgba(255,255,255,0.04); }
.mail-attachment-preview { display: flex; flex: 1; justify-content: space-between; align-items: center; gap: 10px; padding: 9px 11px; color: var(--text); min-width: 0; }
.mail-attachment-preview:hover { text-decoration: none; }
.mail-attachment-download { display: flex; align-items: center; justify-content: center; width: 32px; height: 32px; flex-shrink: 0; color: var(--subtle); border-radius: 4px; margin-right: 6px; transition: color var(--transition), background var(--transition); }
.mail-attachment-download:hover { color: var(--accent); background: rgba(0,0,0,0.06); }
body[data-theme="dark"] .mail-attachment-download:hover { background: rgba(255,255,255,0.08); }
.mail-attachment-name { font-size: 12px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.mail-attachment-meta { font-size: 10px; color: var(--subtle); white-space: nowrap; flex-shrink: 0; }

/* ─── Reply Bar ──────────────────────────────────────────────── */
.reply-bar { display: flex; gap: 8px; align-items: center; padding: 11px 14px; border-top: 1px solid var(--line); background: rgba(0,0,0,0.02); flex-shrink: 0; }
body[data-theme="dark"] .reply-bar { background: rgba(255,255,255,0.01); }
.reply-btn, .send-btn { display: inline-flex; align-items: center; gap: 7px; padding: 8px 12px; font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; border: 1px solid var(--line); background: transparent; cursor: pointer; color: var(--text); transition: background var(--transition), opacity var(--transition); white-space: nowrap; }
.reply-btn:hover { background: rgba(0,0,0,0.04); }
body[data-theme="dark"] .reply-btn:hover { background: rgba(255,255,255,0.04); }
.reply-btn svg { width: 12px; height: 12px; stroke: currentColor; fill: none; stroke-width: 1.6; flex-shrink: 0; }
.reply-btn.primary { background: var(--accent); color: var(--accent-contrast); border-color: var(--accent); }
.reply-btn.primary:hover { opacity: 0.85; background: var(--accent); }

/* ═══════════════════════════════════════════════════════════════
   Skeleton Loading Overlay
   ═══════════════════════════════════════════════════════════════ */
.app-loading-overlay {
  position: fixed;
  inset: 0;
  z-index: 200;
  background: var(--bg);
  display: flex;
  flex-direction: column;
  transition: opacity 0.4s ease, visibility 0.4s ease;
  overflow: hidden;
}
.app-loading-overlay.hidden {
  opacity: 0;
  visibility: hidden;
  pointer-events: none;
}

@keyframes shimmer {
  0% { background-position: -400px 0; }
  100% { background-position: 400px 0; }
}

.skeleton-block {
  background: linear-gradient(90deg, var(--line) 25%, var(--panel-strong) 50%, var(--line) 75%);
  background-size: 800px 100%;
  animation: shimmer 1.8s ease-in-out infinite;
  border-radius: 2px;
}

.skeleton-header {
  height: var(--header-h);
  display: grid;
  grid-template-columns: var(--sidebar-w) 1fr auto;
  gap: 12px;
  padding: 0 16px 0 0;
  align-items: center;
  border-bottom: 1px solid var(--line);
  flex-shrink: 0;
}
.skeleton-header .skeleton-block { height: 34px; }
.skeleton-header-left { display: flex; align-items: center; height: 100%; border-right: 1px solid var(--line); padding: 0 18px; }
.skeleton-header-left .skeleton-block { width: 60px; height: 11px; }
.skeleton-header-center { max-width: 480px; }
.skeleton-header-right { display: flex; align-items: center; gap: 8px; }
.skeleton-header-right .skeleton-block { width: 34px; border-radius: 50%; }
.skeleton-header-right .skeleton-block:last-child { width: 160px; height: 34px; border-radius: 2px; }

.skeleton-body {
  flex: 1;
  display: grid;
  grid-template-columns: var(--sidebar-w) 1fr;
  min-height: 0;
  overflow: hidden;
}
.skeleton-sidebar {
  border-right: 1px solid var(--line);
  padding: 14px 12px;
  display: flex; flex-direction: column; gap: 14px;
}
.skeleton-sidebar .skeleton-block { height: 44px; width: 100%; }
.skeleton-sidebar-nav { display: flex; flex-direction: column; gap: 2px; }
.skeleton-sidebar-nav .skeleton-block { height: 32px; }

.skeleton-mail {
  display: grid;
  grid-template-columns: var(--thread-w) 1fr;
  min-height: 0;
}
.skeleton-threads {
  border-right: 1px solid var(--line);
  display: flex; flex-direction: column;
}
.skeleton-thread-toolbar { height: 48px; flex-shrink: 0; border-bottom: 1px solid var(--line); display: flex; align-items: center; padding: 0 14px; }
.skeleton-thread-toolbar .skeleton-block { height: 11px; width: 60px; }
.skeleton-thread-items { flex: 1; overflow: hidden; }
.skeleton-thread-item {
  display: grid;
  grid-template-columns: 32px 1fr auto;
  gap: 10px;
  padding: 13px 14px;
  border-bottom: 1px solid var(--line);
  align-items: start;
}
.skeleton-thread-item .skeleton-block:first-child { width: 32px; height: 32px; border-radius: 50%; }
.skeleton-thread-body { display: flex; flex-direction: column; gap: 6px; }
.skeleton-thread-body .skeleton-block:nth-child(1) { height: 10px; width: 45%; }
.skeleton-thread-body .skeleton-block:nth-child(2) { height: 12px; width: 70%; }
.skeleton-thread-body .skeleton-block:nth-child(3) { height: 10px; width: 55%; }
.skeleton-thread-item .skeleton-block:last-child { width: 40px; height: 10px; }

.skeleton-view { display: flex; align-items: center; justify-content: center; }
.skeleton-view-card { display: flex; flex-direction: column; align-items: center; gap: 12px; opacity: 0.5; }
.skeleton-view-card .skeleton-block { width: 120px; height: 12px; }
.skeleton-view-card .skeleton-block:first-child { width: 80px; height: 80px; border-radius: 50%; }
.skeleton-view-card .skeleton-block:nth-child(3) { width: 200px; }

@media (max-width: 900px) {
  .skeleton-body { grid-template-columns: 1fr; }
  .skeleton-sidebar { display: none; }
}
@media (max-width: 640px) {
  .skeleton-mail { grid-template-columns: 1fr; }
  .skeleton-view { display: none; }
}

/* ═══════════════════════════════════════════════════════════════
   Compose Overlay + Template Picker
   ═══════════════════════════════════════════════════════════════ */
.compose-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.42);
  display: none; align-items: flex-end; justify-content: flex-end;
  padding: 16px; z-index: 50;
}
.compose-overlay.show { display: flex; }
.compose-modal {
  width: min(600px, calc(100vw - 32px));
  max-height: calc(100vh - 80px);
  display: flex; flex-direction: column;
  background: var(--panel-strong);
  border: 1px solid var(--line);
  box-shadow: 0 20px 56px rgba(0,0,0,0.18);
}
.compose-header {
  display: flex; align-items: center; justify-content: space-between;
  gap: 10px; padding: 11px 13px;
  border-bottom: 1px solid var(--line);
  background: rgba(0,0,0,0.02);
  flex-shrink: 0;
}
body[data-theme="dark"] .compose-header { background: rgba(255,255,255,0.02); }
.compose-header-controls { display: inline-flex; align-items: center; gap: 8px; flex-shrink: 0; }
.compose-title { text-transform: uppercase; letter-spacing: 0.1em; font-size: 11px; color: var(--text); }
.compose-drag-handle { cursor: move; user-select: none; }
.compose-modal.dragging { cursor: grabbing; }
.compose-close {
  width: 24px; height: 24px; display: grid; place-items: center;
  border: 1px solid var(--line); background: transparent; cursor: pointer;
  color: var(--text);
  transition: background var(--transition);
}
.compose-maximize {
  width: 24px; height: 24px; display: grid; place-items: center;
  border: 1px solid var(--line); background: transparent; cursor: pointer;
  color: var(--text);
  transition: background var(--transition);
}
.compose-maximize:hover { background: rgba(0,0,0,0.05); }
body[data-theme="dark"] .compose-maximize:hover { background: rgba(255,255,255,0.05); }
.compose-maximize svg { width: 11px; height: 11px; stroke: currentColor; fill: none; stroke-width: 1.8; }
.compose-modal.is-maximized {
  left: 16px;
  top: 16px;
  right: 16px;
  bottom: 16px;
  width: auto;
  height: auto;
  max-width: none;
  max-height: none;
  transform: none !important;
  resize: none;
}
.compose-close:hover { background: rgba(0,0,0,0.05); }
body[data-theme="dark"] .compose-close:hover { background: rgba(255,255,255,0.05); }
.compose-close svg { width: 11px; height: 11px; stroke: currentColor; fill: none; stroke-width: 1.8; }
.compose-field {
  display: grid; grid-template-columns: 66px 1fr;
  align-items: center; gap: 8px;
  padding: 0 13px;
  border-bottom: 1px solid var(--line);
  flex-shrink: 0;
}
.compose-field label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.12em; color: var(--subtle); line-height: 1; }
.compose-field input { width: 100%; border: 0; outline: 0; background: transparent; color: var(--text); padding: 11px 0; font-size: 12px; }
.compose-field input::placeholder { color: var(--subtle); }
.compose-field.invalid label { color: #b14b4b; }
.compose-field.invalid input { color: #b14b4b; }
.compose-field.invalid { box-shadow: inset 0 -1px 0 #b14b4b; }
.compose-recipient-input { display: flex; align-items: flex-start; gap: 6px; flex: 1; min-width: 0; }
.compose-recipient-input > .recipient-chips { flex: 1; }
.compose-toggle-link { font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--subtle); cursor: pointer; white-space: nowrap; transition: color var(--transition); padding: 2px 4px; border: 1px solid transparent; margin-top: 9px; flex-shrink: 0; }
.compose-toggle-link:hover { color: var(--accent); border-color: var(--line); }
.compose-toggle-link.hidden { display: none; }
.compose-toggle-link.active { color: var(--accent); }

/* ─── Recipient Chip Input ────────────────────────────── */
.recipient-chips { display: flex; flex-wrap: wrap; gap: 4px; align-items: center; padding: 7px 0; min-height: 34px; }
.chip { display: inline-flex; align-items: center; gap: 3px; padding: 2px 6px 2px 8px; background: var(--accent); color: var(--accent-contrast); font-size: 11px; border-radius: 3px; letter-spacing: 0.02em; line-height: 1.5; }
.chip-remove { display: grid; place-items: center; width: 14px; height: 14px; border: 0; background: transparent; color: var(--accent-contrast); cursor: pointer; font-size: 13px; line-height: 1; padding: 0; opacity: 0.65; transition: opacity 0.15s; }
.chip-remove:hover { opacity: 1; }
.chip-input { border: 0; outline: 0; background: transparent; color: var(--text); font-size: 12px; min-width: 80px; flex: 1; }
.chip-input::placeholder { color: var(--subtle); }

.compose-body { flex: 1; overflow: auto; padding: 13px; min-height: 160px; }

/* ─── Resizable Splits ─────────────────────────────────── */
.sidebar-backdrop { display: none; }
.resize-handle {
  position: absolute; top: 0; bottom: 0;
  width: 5px; cursor: col-resize; z-index: 10;
  display: none;
}
.resize-handle::after {
  content: ''; position: absolute;
  top: 0; bottom: 0; left: 1px; right: 1px;
  transition: background 0.15s;
}
.resize-handle:hover::after, .resize-handle.resizing::after { background: var(--accent); }
.app-body, .mail-panel { position: relative; }
#sidebarResize { left: var(--sidebar-w); transform: translateX(-2.5px); }
#splitResize { left: var(--thread-w); transform: translateX(-2.5px); }
.compose-body textarea { width: 100%; min-height: 200px; height: 100%; border: 0; outline: 0; resize: none; background: transparent; color: var(--text); line-height: 1.8; font-size: 12px; }
.compose-body textarea::placeholder { color: var(--subtle); }
.compose-body.invalid,
.compose-body-html.invalid {
  box-shadow: inset 0 0 0 1px #b14b4b;
}
.compose-body.invalid textarea,
.compose-body-html.invalid textarea {
  color: #b14b4b;
}
.compose-attachments { padding: 10px 13px; border-top: 1px solid var(--line); background: rgba(0,0,0,0.02); flex-shrink: 0; }
body[data-theme="dark"] .compose-attachments { background: rgba(255,255,255,0.01); }
.compose-attachments-bar { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.compose-attachment-note { font-size: 10px; color: var(--subtle); text-transform: uppercase; letter-spacing: 0.08em; }
.compose-upload-status { font-size: 10px; color: var(--subtle); text-transform: uppercase; letter-spacing: 0.08em; margin-left: auto; }
.upload-progress { padding: 6px 13px; }
.upload-progress-track { height: 2px; background: var(--line); position: relative; overflow: hidden; border-radius: 2px; }
.upload-progress-bar { height: 100%; background: var(--accent); width: 0%; transition: width 0.3s ease; border-radius: 2px; }
.attachment-list { display: grid; gap: 6px; margin-top: 10px; max-height: 140px; overflow-y: auto; }
.attachment-chip { display: flex; justify-content: space-between; gap: 8px; align-items: center; border: 1px solid var(--line); padding: 8px 10px; background: rgba(0,0,0,0.02); }
.attachment-chip-info { min-width: 0; }
.attachment-chip-name { font-size: 11px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.attachment-chip-meta { font-size: 10px; color: var(--subtle); margin-top: 1px; }
.attachment-chip-remove { width: 24px; height: 24px; display: grid; place-items: center; border: 1px solid var(--line); background: transparent; cursor: pointer; color: var(--muted); flex-shrink: 0; transition: background var(--transition); }
.attachment-chip-remove:hover { background: rgba(0,0,0,0.06); }
.attachment-chip-remove svg { width: 10px; height: 10px; stroke: currentColor; fill: none; stroke-width: 1.8; }
.compose-footer { display: flex; align-items: center; gap: 8px; padding: 11px 13px; border-top: 1px solid var(--line); background: rgba(0,0,0,0.02); flex-shrink: 0; }
body[data-theme="dark"] .compose-footer { background: rgba(255,255,255,0.01); }
.send-btn { background: var(--accent); color: var(--accent-contrast); border-color: var(--accent); }
.send-btn:hover:not(:disabled) { opacity: 0.85; }
.send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
.send-spinner { width: 11px; height: 11px; border: 1.5px solid rgba(255,255,255,0.25); border-top-color: rgba(255,255,255,0.9); border-radius: 50%; display: none; animation: spin 0.8s linear infinite; }
.send-btn.loading .send-spinner { display: block; }
.send-btn.loading .send-icon { display: none; }
.compose-from-label { margin-left: auto; color: var(--subtle); font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.send-btn svg { width: 12px; height: 12px; stroke: currentColor; fill: none; stroke-width: 1.6; flex-shrink: 0; }

/* ─── NEW: Template Mode Toggle ──────────────────────────── */
.compose-mode-bar {
  display: flex;
  align-items: center;
  border-bottom: 1px solid var(--line);
  flex-shrink: 0;
  background: rgba(0,0,0,0.01);
  padding: 0 13px;
  gap: 0;
}
body[data-theme="dark"] .compose-mode-bar { background: rgba(255,255,255,0.01); }

.compose-mode-btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 9px 12px 9px 0;
  font-size: 10px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--subtle);
  border: 0;
  border-bottom: 2px solid transparent;
  background: transparent;
  cursor: pointer;
  transition: color var(--transition), border-color var(--transition);
  margin-right: 12px;
  margin-bottom: -1px;
}
.compose-mode-btn:hover { color: var(--text); }
.compose-mode-btn.active {
  color: var(--text);
  border-bottom-color: var(--text);
}
.compose-mode-btn svg { width: 11px; height: 11px; stroke: currentColor; fill: none; stroke-width: 1.6; }

/* ─── Template Picker Panel ──────────────────────────────── */
.template-picker {
  display: none;
  flex-direction: column;
  border-bottom: 1px solid var(--line);
  background: rgba(0,0,0,0.01);
  flex-shrink: 0;
  overflow: hidden;
}
body[data-theme="dark"] .template-picker { background: rgba(255,255,255,0.01); }
.template-picker.show { display: flex; }

.template-picker-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 13px 0;
}
.template-picker-label {
  font-size: 9px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--subtle);
}

.template-grid {
  display: flex;
  gap: 8px;
  padding: 8px 13px 12px;
  overflow-x: auto;
  overflow-y: hidden;
  scroll-snap-type: x proximity;
  -webkit-overflow-scrolling: touch;
}
.template-card {
  border: 1px solid var(--line);
  background: var(--panel-strong);
  padding: 10px 11px;
  cursor: pointer;
  transition: border-color var(--transition), background var(--transition);
  display: flex;
  flex-direction: column;
  gap: 4px;
  text-align: left;
  flex: 0 0 170px;
  min-width: 170px;
  scroll-snap-align: start;
}
.template-card:hover {
  border-color: var(--muted);
  background: rgba(0,0,0,0.02);
}
body[data-theme="dark"] .template-card:hover { background: rgba(255,255,255,0.04); }
.template-card.selected {
  border-color: var(--text);
  background: rgba(0,0,0,0.03);
}
body[data-theme="dark"] .template-card.selected { background: rgba(255,255,255,0.06); }
.template-card-icon {
  width: 28px;
  height: 28px;
  border: 1px solid var(--line);
  display: grid;
  place-items: center;
  margin-bottom: 4px;
  flex-shrink: 0;
}
.template-card-icon svg { width: 13px; height: 13px; stroke: var(--muted); fill: none; stroke-width: 1.5; }
.template-card.selected .template-card-icon { border-color: var(--text); }
.template-card.selected .template-card-icon svg { stroke: var(--text); }
.template-card-name { font-size: 10px; letter-spacing: 0.06em; color: var(--text); }
.template-card-desc { font-size: 9px; color: var(--subtle); letter-spacing: 0.04em; line-height: 1.4; }

/* Template mode: body becomes HTML editor mode with preview */
.compose-body-html {
  display: none;
  flex-direction: column;
  flex: 1;
  min-height: 0;
}
.compose-body-html.show { display: flex; }
.compose-body.hide { display: none; }

.html-editor-tabs {
  display: flex;
  border-bottom: 1px solid var(--line);
  padding: 0 13px;
  background: rgba(0,0,0,0.01);
  flex-shrink: 0;
}
body[data-theme="dark"] .html-editor-tabs { background: rgba(255,255,255,0.01); }
.html-tab-btn {
  padding: 8px 12px 8px 0;
  font-size: 10px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--subtle);
  border: 0;
  border-bottom: 2px solid transparent;
  background: transparent;
  cursor: pointer;
  margin-right: 10px;
  margin-bottom: -1px;
  transition: color var(--transition);
}
.html-tab-btn:hover { color: var(--text); }
.html-tab-btn.active { color: var(--text); border-bottom-color: var(--text); }

.html-editor-pane {
  flex: 1;
  display: none;
  overflow: auto;
  padding: 13px;
  min-height: 0;
}
.html-editor-pane.active { display: block; }
.html-editor-pane textarea {
  width: 100%;
  height: 100%;
  min-height: 180px;
  border: 0;
  outline: 0;
  resize: none;
  background: transparent;
  color: var(--text);
  line-height: 1.7;
  font-family: 'DM Mono', monospace;
  font-size: 11px;
}

.html-preview-pane {
  flex: 1;
  display: none;
  overflow: auto;
  min-height: 0;
  border: 0;
  background: #ffffff;
}
.html-preview-pane.active { display: block; }

/* ─── Status Bar ─────────────────────────────────────────────── */
.status-bar { height: var(--status-h); display: flex; align-items: center; gap: 12px; padding: 0 13px; border-top: 1px solid var(--line); background: var(--panel); flex-shrink: 0; }
.status-item { font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--subtle); display: inline-flex; align-items: center; gap: 5px; white-space: nowrap; }
.status-item.ml { margin-left: auto; }
.status-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--unread-dot); }

/* ─── Toast ──────────────────────────────────────────────────── */
.toast { position: fixed; left: 50%; bottom: 20px; transform: translateX(-50%) translateY(8px); padding: 9px 14px; background: var(--accent); color: var(--accent-contrast); opacity: 0; pointer-events: none; transition: opacity 0.2s ease, transform 0.2s ease; z-index: 100; font-size: 11px; letter-spacing: 0.08em; max-width: calc(100vw - 32px); }
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
.toast.err { background: #a33a3a; color: #fff; }

/* ─── Animations ─────────────────────────────────────────────── */
@keyframes spin { to { transform: rotate(360deg); } }
@keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
@keyframes pageRise { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
@keyframes floatIn { from { opacity: 0; transform: translateY(8px) scale(0.99); } to { opacity: 1; transform: translateY(0) scale(1); } }
@keyframes logoAppear { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
@keyframes ringRotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

.mail-bubble { animation: fadeIn 0.2s ease; }
header, .app-body, .compose-modal { animation: pageRise 0.32s ease both; }
.thread-item { animation: fadeIn 0.2s ease both; }
.thread-item:nth-child(2) { animation-delay: 0.01s; }
.thread-item:nth-child(3) { animation-delay: 0.02s; }
.thread-item:nth-child(4) { animation-delay: 0.03s; }

/* ─── Responsive ─────────────────────────────────────────────── */
@media (max-width: 1100px) {

  .h-search input { font-size: 11px; }
  .status-bar { display: none; }
  .app-body { height: calc(100vh - var(--header-h)); grid-template-columns: 1fr; overflow: hidden; }
  .mail-panel { grid-template-columns: 1fr; position: relative; height: 100%; overflow: hidden; }
  .thread-list { display: flex !important; position: absolute; inset: 0; width: 100%; z-index: 1; background: var(--panel-strong); transform: translateX(0); transition: transform 0.28s cubic-bezier(0.4, 0, 0.2, 1); will-change: transform; }
  .thread-items { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; overscroll-behavior: contain; }
  .mail-view { position: absolute; inset: 0; width: 100%; z-index: 2; background: var(--panel-strong); transform: translateX(100%); transition: transform 0.28s cubic-bezier(0.4, 0, 0.2, 1); will-change: transform; display: flex; flex-direction: column; overflow: hidden; }
  .mail-panel.message-open .mail-view { transform: translateX(0); }

  #messageView { display: none; flex-direction: column; flex: 1; min-height: 0; overflow: hidden; }
  #messageView[style*="flex"] { display: flex !important; }
  .mail-body-scroll { flex: 1; min-height: 0; overflow-y: auto; -webkit-overflow-scrolling: touch; overscroll-behavior: contain; padding: 12px; }
  .mail-header-bar { padding: 11px 12px; gap: 8px; flex-shrink: 0; min-height: unset; }
  .mail-subject-line { font-size: 17px; }
  .mail-header-actions { gap: 4px; }
  .mail-header-actions .icon-btn { width: 30px; height: 30px; }
  .reply-bar { padding: 8px 12px; flex-shrink: 0; }
  .reply-btn { padding: 8px 10px; font-size: 10px; }
  .mobile-back-btn { display: grid !important; place-items: center; width: 30px; height: 30px; border: 1px solid var(--line); background: transparent; cursor: pointer; color: var(--muted); padding: 0; flex-shrink: 0; -webkit-tap-highlight-color: transparent; }
  .mobile-back-btn svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 1.6; }
  .thread-toolbar { padding: 0 12px; }
  .thread-item { padding: 14px 12px; min-height: 72px; -webkit-tap-highlight-color: transparent; }
  .thread-subject { font-size: 13px; }
  .thread-preview { -webkit-line-clamp: 2; font-size: 12px; color: var(--subtle); margin-top: 2px; }
  .thread-from { font-size: 12px; margin-bottom: 4px; }
  .thread-time { font-size: 11px; }
  .mail-bubble { margin-bottom: 10px; }
  .mail-bubble-body { padding: 12px 12px 10px; font-size: 13px; line-height: 1.75; word-break: break-word; overflow-wrap: break-word; }
  .mail-bubble-header { padding: 10px 12px; }
  .mail-view-empty h3 { font-size: 20px; }
  .compose-overlay { padding: 0; align-items: flex-end; }
  .compose-modal { width: 100%; max-height: calc(100vh - var(--header-h)); position: relative; border-left: 0; border-right: 0; border-bottom: 0; }
  .compose-body { min-height: 120px; }
  .compose-body textarea { min-height: 120px; }
  .toast { bottom: 12px; }
  .template-grid { padding-bottom: 10px; }
}

@media (min-width: 641px) {
  .compose-overlay { align-items: flex-end; justify-content: flex-end; }

    position: fixed;

/* ── 3-Way Theme ── */
const themeBtn = document.getElementById('themeBtn');
const THEME_ICONS = {
  system: '<svg viewBox="0 0 24 24" aria-hidden="true"><rect x="4" y="6" width="16" height="12" rx="1"></rect><path d="M9 22h6M12 18v4"></path></svg>',
  light: '<svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="4"></circle><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"></path></svg>',
  dark: '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8Z"></path></svg>',
};
const THEME_LABELS = { system: 'System', light: 'Light', dark: 'Dark' };

function setCookie(name, value, days = 365) {
  const d = new Date();
  d.setTime(d.getTime() + days * 864e5);
  document.cookie = name + '=' + encodeURIComponent(value) + ';expires=' + d.toUTCString() + ';path=/;SameSite=Lax';
}
function getCookie(name) {
  return document.cookie.split('; ').find((r) => r.startsWith(name + '='))?.split('=')[1];
}

function applyTheme(theme) {
  if (theme === 'system') {
    document.documentElement.removeAttribute('data-theme');
    document.body.removeAttribute('data-theme');
  } else {
    document.documentElement.setAttribute('data-theme', theme);
    document.body.setAttribute('data-theme', theme);
  }
}

function renderThemeIcon(theme = localStorage.getItem('synthrun-theme') || 'system') {
  if (!themeBtn) return;
  themeBtn.innerHTML = THEME_ICONS[theme] || THEME_ICONS.system;
  themeBtn.title = `Theme: ${THEME_LABELS[theme] || 'System'} (click to cycle)`;
  themeBtn.setAttribute('aria-label', `Theme: ${THEME_LABELS[theme] || 'System'}`);
}

function setTheme(theme) {
  localStorage.setItem('synthrun-theme', theme);
  setCookie('synthrun-theme', theme);
  applyTheme(theme);
  renderThemeIcon(theme);
}
const systemMedia = window.matchMedia('(prefers-color-scheme: dark)');
systemMedia.addEventListener('change', () => {
  const t = localStorage.getItem('synthrun-theme') || 'system';
  applyTheme(t);
});
setTheme(localStorage.getItem('synthrun-theme') || decodeURIComponent(getCookie('synthrun-theme') || '') || 'system');
themeBtn?.addEventListener('click', () => {
  const c = localStorage.getItem('synthrun-theme') || 'system';
  setTheme(c === 'system' ? 'light' : c === 'light' ? 'dark' : 'system');
});
renderThemeIcon();

/* ── Body data-theme sync (for backward CSS compat) ── */
const themeObserver = new MutationObserver(() => {
  const htmlTheme = document.documentElement.getAttribute('data-theme');
  document.body.setAttribute('data-theme', htmlTheme || 'light');
});
themeObserver.observe(document.documentElement, { attributes: true, attributeFilter: ['data-theme'] });

/* ── Recipient Chip Input ── */
function initChipInput(containerId, placeholder = 'add recipient') {
  const container = document.getElementById(containerId);
  const hidden = container.querySelector('input[type="hidden"]');
  const chipInput = container.querySelector('.chip-input');
  let chips = [];

  function parseEmails(str) {
    return str.split(/[,;]/).map(s => s.trim().toLowerCase()).filter(Boolean);
  }

  function render() {
    hidden.value = chips.join(', ');
    let html = '';
    for (const email of chips) {
      const enc = email.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
      html += `<span class="chip">${enc}<button class="chip-remove" data-email="${enc}">&times;</button></span>`;
    }
    html += `<input type="text" class="chip-input" placeholder="${chips.length ? '' : placeholder}" autocomplete="email">`;
    container.innerHTML = html;
    container.prepend(hidden);
    const newInput = container.querySelector('.chip-input');
    const existingChips = parseEmails(hidden.value);
    if (existingChips.length && !chips.length) {
      chips = existingChips;
      render();
      return;
    }
    bindInput(newInput);
    bindRemoves();
  }

  function bindInput(input) {
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' || e.key === ',') {
        e.preventDefault();
        addFromInput(input);
      } else if (e.key === 'Backspace' && input.selectionStart === 0 && chips.length) {
        chips.pop();
        render();
      }
    });
    input.addEventListener('blur', () => addFromInput(input));
    input.addEventListener('paste', () => setTimeout(() => addFromInput(input), 0));
  }

  function bindRemoves() {
    container.querySelectorAll('.chip-remove').forEach(btn => {
      btn.addEventListener('click', () => {
        chips = chips.filter(e => e !== btn.dataset.email);
        render();
      });
    });
  }

  function addFromInput(input) {
    const val = input.value.trim().replace(/[,;]+$/, '').trim();
    if (val) {
      const parsed = parseEmails(val);
      for (const email of parsed) {
        if (!chips.includes(email)) chips.push(email);
      }
    }
    input.value = '';
    render();
  }

  chips = parseEmails(hidden.value);
  render();
}
window.SYNTHRUN_INIT_CHIP_INPUT = initChipInput;

function flushChipInputs() {
  ['toChips', 'ccChips', 'bccChips'].forEach((id) => {
    const container = document.getElementById(id);
    if (!container) return;
    const input = container.querySelector('.chip-input');
    if (input && input.value.trim()) {
      const hidden = container.querySelector('input[type="hidden"]');
      const existing = hidden.value ? hidden.value.split(',').map(s => s.trim()).filter(Boolean) : [];
      const newEmails = input.value.split(/[,;]/).map(s => s.trim().toLowerCase()).filter(Boolean);
      const all = [...existing];
      for (const e of newEmails) { if (!all.includes(e)) all.push(e); }
      hidden.value = all.join(', ');
      initChipInput(id);
    }
  });
}
window.SYNTHRUN_FLUSH_CHIPS = flushChipInputs;

/* ── Resizable Splits (desktop only) ── */
function initResize(handleId, cssVar, minPx, maxPx) {
  const handle = document.getElementById(handleId);
  if (!handle) return;
  let startX, startVal;

  function onMouseDown(e) {
    e.preventDefault();
    startX = e.clientX;
    startVal = parseInt(getComputedStyle(document.documentElement).getPropertyValue(cssVar).trim()) || 220;
    handle.classList.add('resizing');
    document.documentElement.style.userSelect = 'none';
    document.body.style.cursor = 'col-resize';
    document.addEventListener('mousemove', onMouseMove);
    document.addEventListener('mouseup', onMouseUp);
  }

  function onMouseMove(e) {
    const dx = e.clientX - startX;
    const dir = 1;
    let val = Math.round(startVal + dx * dir);
    if (val < minPx) val = minPx;
    if (val > maxPx) val = maxPx;
    document.documentElement.style.setProperty(cssVar, val + 'px');
  }

  function onMouseUp() {
    handle.classList.remove('resizing');
    document.documentElement.style.userSelect = '';
    document.body.style.cursor = '';
    document.removeEventListener('mousemove', onMouseMove);
    document.removeEventListener('mouseup', onMouseUp);
    const val = parseInt(getComputedStyle(document.documentElement).getPropertyValue(cssVar).trim());
    if (val) {
      const key = 'synthrun-' + cssVar.replace('--', '');
      localStorage.setItem(key, val);
      setCookie(key, val);
    }
  }

  handle.addEventListener('mousedown', onMouseDown);
  const key = 'synthrun-' + cssVar.replace('--', '');
  const saved = localStorage.getItem(key) || getCookie(key);
  if (saved && window.innerWidth > 900) {
    document.documentElement.style.setProperty(cssVar, saved + 'px');
  }
}

if (window.innerWidth > 900) {
  initResize('sidebarResize', '--sidebar-w', 160, 400);

  const htmlBodyTA = document.getElementById('compHtmlBody');
  const composeTitle = document.getElementById('compose-title-label');
  const composeModal = document.getElementById('composeModal');
  const composeMaxBtn = document.getElementById('composeMaxBtn');

  let currentMode = 'plain';
  let selectedTemplate = null;
  const templateLibrary = window.SYNTHRUN_EMAIL_TEMPLATES || {};
  let composeDragState = null;

  function isDesktopCompose() {
    return window.matchMedia('(min-width: 641px)').matches;
  }

  function setComposeDefaultPlacement() {
    if (!composeModal || !isDesktopCompose()) return;
    composeModal.style.right = '16px';
    composeModal.style.bottom = '16px';
    composeModal.style.top = 'auto';
    composeModal.style.left = 'auto';
    composeModal.style.transform = 'none';
  }

  function centerComposeModal() {
    if (!composeModal || !isDesktopCompose()) return;
    composeModal.classList.remove('dragging');
    setComposeDefaultPlacement();
  }

  function setComposeMaximized(isMaximized) {
    if (!composeModal) return;
    composeModal.classList.toggle('is-maximized', Boolean(isMaximized));
    composeMaxBtn?.setAttribute('aria-pressed', String(Boolean(isMaximized)));
    if (isMaximized) {
      composeModal.style.left = '16px';
      composeModal.style.top = '16px';
      composeModal.style.right = '16px';
      composeModal.style.bottom = '16px';
      composeModal.style.transform = 'none';
    } else {
      centerComposeModal();
    }
  }

  function resetComposePlacement() {
    if (!composeModal) return;
    composeDragState = null;
    composeModal.classList.remove('dragging');
    composeModal.classList.remove('is-maximized');
    setComposeDefaultPlacement();
    composeModal.style.width = '';
    composeModal.style.height = '';
    composeModal.style.maxHeight = '';
    composeModal.style.maxWidth = '';
    composeModal.style.resize = '';
    composeMaxBtn?.setAttribute('aria-pressed', 'false');
  }

  async function ensureTemplateValue(key) {
    if (key === 'custom') {
      const name = window.prompt('Custom template name', 'there');
      if (name === null) throw new Error('Custom template cancelled');
      const message = window.prompt('Custom template message', 'Thanks for reaching out.');
      if (message === null) throw new Error('Custom template cancelled');
      const cta = window.prompt('Custom CTA label', 'Visit Synthrun &rarr;');
      if (cta === null) throw new Error('Custom template cancelled');
      const buildCustomTemplate = window.SYNTHRUN_BUILD_CUSTOM_TEMPLATE;
      if (typeof buildCustomTemplate !== 'function') throw new Error('Custom template builder unavailable');
      const html = buildCustomTemplate(name.trim(), message, cta.trim());
      if (htmlBodyTA) {
        htmlBodyTA.value = html;
      }
      return html;
    }

    const html = templateLibrary[key];
    if (!html) throw new Error(`Missing template: ${key}`);
    if (htmlBodyTA) {
      htmlBodyTA.value = html;
    }
    return html;
  }

  /* Switch between plain and template mode */
  async function switchMode(mode) {
    currentMode = mode;
    if (mode === 'plain') {
      modePlain.classList.add('active');
      modePlain.setAttribute('aria-selected', 'true');
      modeTemplate.classList.remove('active');
      modeTemplate.setAttribute('aria-selected', 'false');
      templatePicker.classList.remove('show');
      plainBody.classList.remove('hide');
      htmlBody.classList.remove('show');
      composeTitle.textContent = 'New message';
    } else {
      modeTemplate.classList.add('active');
      modeTemplate.setAttribute('aria-selected', 'true');
      modePlain.classList.remove('active');
      modePlain.setAttribute('aria-selected', 'false');
      templatePicker.classList.add('show');
      plainBody.classList.add('hide');
      htmlBody.classList.add('show');
      composeTitle.textContent = 'New HTML message';
      // Auto-select the extension default if none selected
      if (!selectedTemplate) await selectTemplate('auto-reply');
    }
  }

  async function selectTemplate(key) {
    selectedTemplate = key;
    templateCards.forEach(card => {
      const isThis = card.dataset.template === key;
      card.classList.toggle('selected', isThis);
      card.setAttribute('aria-checked', isThis ? 'true' : 'false');
    });
    try {
      await ensureTemplateValue(key);
      updatePreview();
    } catch (error) {
      selectedTemplate = null;
      templateCards.forEach(card => {
        card.classList.remove('selected');
        card.setAttribute('aria-checked', 'false');
      });
      if (error?.message !== 'Custom template cancelled') {
        console.error('selectTemplate:', error);
      }
    }
  }

  function updatePreview() {
    try {
      const doc = htmlPreviewPane.contentDocument || htmlPreviewPane.contentWindow.document;
      doc.open();
      doc.write(htmlBodyTA.value);
      doc.close();
    } catch(e) {}
  }

  modePlain.addEventListener('click', () => { void switchMode('plain'); });
  modeTemplate.addEventListener('click', () => { void switchMode('template'); });

  composeMaxBtn?.addEventListener('click', () => {
    setComposeMaximized(!composeModal.classList.contains('is-maximized'));
  });

  composeModal?.addEventListener('pointerdown', (event) => {
    if (!isDesktopCompose()) return;
    if (composeModal.classList.contains('is-maximized')) return;
    if (!event.target.closest('.compose-header')) return;
    if (event.target.closest('button')) return;

    const rect = composeModal.getBoundingClientRect();
    composeDragState = {
      pointerId: event.pointerId,
      offsetX: event.clientX - rect.left,
      offsetY: event.clientY - rect.top,
      width: rect.width,
      height: rect.height,
    };
    composeModal.classList.add('dragging');
    composeModal.style.left = `${rect.left}px`;
    composeModal.style.top = `${rect.top}px`;
    composeModal.style.right = 'auto';
    composeModal.style.bottom = 'auto';
    composeModal.style.transform = 'none';
    composeModal.setPointerCapture(event.pointerId);
    event.preventDefault();
  });

  composeModal?.addEventListener('pointermove', (event) => {
    if (!composeDragState || composeDragState.pointerId !== event.pointerId) return;
    const nextLeft = Math.max(12, Math.min(window.innerWidth - composeDragState.width - 12, event.clientX - composeDragState.offsetX));
    const nextTop = Math.max(12, Math.min(window.innerHeight - composeDragState.height - 12, event.clientY - composeDragState.offsetY));
    composeModal.style.left = `${nextLeft}px`;
    composeModal.style.top = `${nextTop}px`;
  });

  composeModal?.addEventListener('pointerup', (event) => {
    if (!composeDragState || composeDragState.pointerId !== event.pointerId) return;
    composeDragState = null;
    composeModal.classList.remove('dragging');
    try { composeModal.releasePointerCapture(event.pointerId); } catch (_) {}
  });

  composeModal?.addEventListener('pointercancel', () => {
    composeDragState = null;
    composeModal.classList.remove('dragging');
  });

  templateCards.forEach(card => {
    card.addEventListener('click', () => { void selectTemplate(card.dataset.template); });
  });

  /* HTML editor tabs: Code / Preview */
  htmlTabCode.addEventListener('click', () => {
    htmlTabCode.classList.add('active');
    htmlTabCode.setAttribute('aria-selected', 'true');
    htmlTabPreview.classList.remove('active');
    htmlTabPreview.setAttribute('aria-selected', 'false');
    htmlCodePane.classList.add('active');
    htmlPreviewPane.classList.remove('active');
  });

  htmlTabPreview.addEventListener('click', () => {
    updatePreview();
    htmlTabPreview.classList.add('active');
    htmlTabPreview.setAttribute('aria-selected', 'true');
    htmlTabCode.classList.remove('active');
    htmlTabCode.setAttribute('aria-selected', 'false');
    htmlPreviewPane.classList.add('active');
    htmlCodePane.classList.remove('active');
  });

  /* Cc / Bcc toggle */
  const ccField = document.getElementById('ccField');
  const bccField = document.getElementById('bccField');
  const ccToggle = document.getElementById('ccToggleBtn');
  const bccToggle = document.getElementById('bccToggleBtn');
  function resetRecipientFields() {
    ccField.style.display = 'none';
    bccField.style.display = 'none';
    ccToggle.classList.remove('active');
    bccToggle.classList.remove('active');
    document.getElementById('compCc').value = '';
    document.getElementById('compBcc').value = '';
  }
  ccToggle.addEventListener('click', () => {
    const show = ccField.style.display === 'none';
    ccField.style.display = show ? '' : 'none';
    ccToggle.classList.toggle('active', show);
    if (show) document.getElementById('compCc').focus();
  });
  bccToggle.addEventListener('click', () => {
    const show = bccField.style.display === 'none';
    bccField.style.display = show ? '' : 'none';
    bccToggle.classList.toggle('active', show);
    if (show) document.getElementById('compBcc').focus();
  });
  window.SYNTHRUN_OPEN_CC = () => {
    if (ccField.style.display === 'none') ccToggle.click();
  };
  window.SYNTHRUN_OPEN_BCC = () => {
    if (bccField.style.display === 'none') bccToggle.click();
  };

  /* Reset compose when overlay closes */
  document.getElementById('closeCompose')?.addEventListener('click', () => {
    void switchMode('plain');
    selectedTemplate = null;
    templateCards.forEach(c => { c.classList.remove('selected'); c.setAttribute('aria-checked','false'); });
    htmlBodyTA.value = '';
    resetComposePlacement();
    resetRecipientFields();
  });
  document.getElementById('discardBtn')?.addEventListener('click', () => {
    void switchMode('plain');
    selectedTemplate = null;
    templateCards.forEach(c => { c.classList.remove('selected'); c.setAttribute('aria-checked','false'); });
    htmlBodyTA.value = '';
    resetComposePlacement();
    resetRecipientFields();
  });

  /* Expose getter for mail-app-clean.js to retrieve body content */
  window.SYNTHRUN_GET_COMPOSE_BODY = function() {
    if (currentMode === 'template') return htmlBodyTA.value;
    return document.getElementById('compBody').value;
  };
  window.SYNTHRUN_GET_COMPOSE_IS_HTML = function() {
    return currentMode === 'template';
  };
  window.SYNTHRUN_RESET_COMPOSE_MODAL = resetComposePlacement;
})();
</script>
</body>
</html>
